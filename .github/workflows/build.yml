name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Download Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/tools_r25.2.5-linux.zip
        unzip -q tools_r25.2.5-linux.zip
        rm tools_r25.2.5-linux.zip
    
    - name: Setup Android SDK Environment
      run: |
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/tools:$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
    
    - name: Install Android SDK Components
      run: |
        echo "y" | $HOME/android-sdk/tools/android update sdk --no-ui --all --filter platform-tools,android-22,build-tools-22.0.1
    
    - name: Build Server APK
      run: |
        set -x
        cd Server
        mkdir -p build/outputs/apk/debug bin/classes gen
        
        echo "=== Environment Check ==="
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls -la $ANDROID_HOME/build-tools/22.0.1/aapt
        ls -la $ANDROID_HOME/platforms/android-22/android.jar
        ls -la bin/dexedLibs/
        
        echo "=== Step 1: aapt compile resources ==="
        $ANDROID_HOME/build-tools/22.0.1/aapt package -f -m \
          -J gen -S res -M AndroidManifest.xml \
          -I $ANDROID_HOME/platforms/android-22/android.jar
        AAPT_RESULT=$?
        echo "aapt result: $AAPT_RESULT"
        if [ $AAPT_RESULT -ne 0 ]; then
          echo "ERROR: aapt resource compilation failed with code $AAPT_RESULT"
          exit 1
        fi
        echo "gen/R.java created:"
        ls -la gen/com/example/server/R.java 2>/dev/null || echo "R.java not found!"
        
        echo "=== Step 2: javac compile ==="
        find src gen -name "*.java" > sources.txt
        cat sources.txt
        CLASSPATH="$ANDROID_HOME/platforms/android-22/android.jar"
        for jar in bin/dexedLibs/*.jar; do
          CLASSPATH="$CLASSPATH:$jar"
          echo "Adding to classpath: $jar"
        done
        echo "Full CLASSPATH: $CLASSPATH"
        javac -d bin/classes \
          -sourcepath src:gen \
          -bootclasspath $ANDROID_HOME/platforms/android-22/android.jar \
          -classpath "$CLASSPATH" \
          @sources.txt
        JAVAC_RESULT=$?
        echo "javac result: $JAVAC_RESULT"
        if [ $JAVAC_RESULT -ne 0 ]; then
          echo "ERROR: javac compilation failed with code $JAVAC_RESULT"
          exit 1
        fi
        echo "Compiled classes:"
        ls -la bin/classes/com/example/server/
        
        echo "=== Step 3: dx create DEX ==="
        $ANDROID_HOME/build-tools/22.0.1/dx --dex \
          --output=bin/classes.dex \
          bin/classes bin/dexedLibs/*.jar
        DX_RESULT=$?
        echo "dx result: $DX_RESULT"
        if [ $DX_RESULT -ne 0 ]; then
          echo "ERROR: dex creation failed with code $DX_RESULT"
          exit 1
        fi
        ls -la bin/classes.dex
        
        echo "=== Step 4: aapt package APK ==="
        $ANDROID_HOME/build-tools/22.0.1/aapt package -f \
          -M AndroidManifest.xml -S res \
          -I $ANDROID_HOME/platforms/android-22/android.jar \
          -F bin/Server.apk.unaligned
        AAPT_PKG_RESULT=$?
        echo "aapt package result: $AAPT_PKG_RESULT"
        if [ $AAPT_PKG_RESULT -ne 0 ]; then
          echo "ERROR: aapt packaging failed with code $AAPT_PKG_RESULT"
          exit 1
        fi
        
        echo "=== Step 5: add DEX to APK ==="
        $ANDROID_HOME/build-tools/22.0.1/aapt add bin/Server.apk.unaligned bin/classes.dex
        ADD_DEX_RESULT=$?
        echo "add dex result: $ADD_DEX_RESULT"
        
        echo "=== Step 6: zipalign ==="
        $ANDROID_HOME/build-tools/22.0.1/zipalign -f 4 bin/Server.apk.unaligned bin/Server.apk
        ZIPALIGN_RESULT=$?
        echo "zipalign result: $ZIPALIGN_RESULT"
        
        rm -f bin/Server.apk.unaligned
        cp bin/Server.apk build/outputs/apk/debug/
        
        echo "=== BUILD COMPLETE ==="
        ls -la bin/Server.apk
        ls -la build/outputs/apk/debug/
    
    - name: Upload Server APK
      uses: actions/upload-artifact@v4
      with:
        name: server-apk
        path: |
          Server/build/outputs/apk/debug/*.apk
          Server/bin/*.apk
      if: always()