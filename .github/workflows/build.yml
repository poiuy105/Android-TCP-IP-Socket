name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download Android SDK Command-line Tools
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/bin cmdline-tools/latest/
        mv cmdline-tools/lib cmdline-tools/latest/
        rm -rf cmdline-tools/__MACOSX
        rm commandlinetools-linux-11076708_latest.zip
    
    - name: Setup Android SDK Environment
      run: |
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
    
    - name: Install Android SDK Components
      run: |
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
    
    - name: Build PostTellMe APK
      run: chmod +x build_apk.sh && bash build_apk.sh
    
    - name: Upload PostTellMe APK
      uses: actions/upload-artifact@v4
      with:
        name: PostTellMe-apk-v1.1
        path: |
          Server/build/outputs/apk/debug/*.apk
          Server/bin/*.apk
      if: always()
    
    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.1
        name: Release v1.1 - Android TV Compatibility
        body: |
          ## Android TV Compatibility Optimization v1.1
          
          ### New Features
          - Android TV boot auto-start feature
          - Optimized background service keep-alive mechanism
          - Enhanced TTS compatibility for TV devices
          - Improved floating window display on TV screens
          - Updated targetSdkVersion to 34
          
          ### Improvements
          - Added TV device detection and adaptive boot delay
          - Implemented service restart mechanism with retry logic
          - Enhanced notification priority for TV devices
          - Optimized floating window size and position for TV screens
          - Added memory management for TV device compatibility
          
          ### Technical Changes
          - Updated minSdkVersion to 21
          - Updated compileSdkVersion to 34
          - Migrated to AndroidX libraries
          - Added Leanback support for Android TV
          
          ### Compatibility
          - Tested on Android TV devices
          - Compatible with Android 5.0+ (API 21+)
          - Supports both phone and TV form factors
        files: |
          Server/build/outputs/apk/debug/*.apk
          Server/bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
