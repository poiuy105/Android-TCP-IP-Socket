name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Download Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/tools_r25.2.5-linux.zip
        unzip -q tools_r25.2.5-linux.zip
        rm tools_r25.2.5-linux.zip
    
    - name: Setup Android SDK Environment
      run: |
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/tools:$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
    
    - name: Install Android SDK Components
      run: |
        echo "y" | $HOME/android-sdk/tools/android update sdk --no-ui --all --filter platform-tools,android-22,build-tools-22.0.1
    
    - name: Build Server APK
      run: |
        cd Server
        mkdir -p build/outputs/apk/debug bin/classes gen
        
        echo "=== Building Server APK from source ==="
        
        # Step 1: Compile resources (aapt)
        echo "Step 1: Compiling resources..."
        $ANDROID_HOME/build-tools/22.0.1/aapt package -f -m \
          -J gen \
          -S res \
          -M AndroidManifest.xml \
          -I $ANDROID_HOME/platforms/android-22/android.jar \
          --non-constant-id || { echo "aapt failed"; exit 1; }
        
        # Step 2: Compile Java source files
        echo "Step 2: Compiling Java sources..."
        find src gen -name "*.java" > sources.txt
        javac -d bin/classes \
          -sourcepath src:gen \
          -bootclasspath $ANDROID_HOME/platforms/android-22/android.jar \
          -classpath $ANDROID_HOME/platforms/android-22/android.jar \
          @sources.txt 2>&1 | head -50 || { echo "javac failed"; exit 1; }
        
        # Step 3: Create DEX file (dx)
        echo "Step 3: Creating DEX..."
        $ANDROID_HOME/build-tools/22.0.1/dx --dex \
          --output=bin/classes.dex \
          bin/classes 2>&1 || { echo "dx failed"; exit 1; }
        
        # Step 4: Package resources into APK (aapt)
        echo "Step 4: Packaging resources..."
        $ANDROID_HOME/build-tools/22.0.1/aapt package -f \
          -M AndroidManifest.xml \
          -S res \
          -I $ANDROID_HOME/platforms/android-22/android.jar \
          -F bin/Server.apk.unaligned 2>&1 || { echo "aapt package failed"; exit 1; }
        
        # Step 5: Add classes.dex to APK (aapt)
        echo "Step 5: Adding DEX to APK..."
        $ANDROID_HOME/build-tools/22.0.1/aapt add bin/Server.apk.unaligned bin/classes.dex 2>&1 || { echo "add dex failed"; exit 1; }
        
        # Step 6: Align the APK (zipalign)
        echo "Step 6: Aligning APK..."
        $ANDROID_HOME/build-tools/22.0.1/zipalign -f 4 bin/Server.apk.unaligned bin/Server.apk 2>&1 || { echo "zipalign failed"; exit 1; }
        
        rm -f bin/Server.apk.unaligned
        
        # Copy to output directory
        cp bin/Server.apk build/outputs/apk/debug/
        
        echo "=== Build Complete ==="
        echo "APK Size: $(ls -la bin/Server.apk | awk '{print $5}') bytes"
        ls -la build/outputs/apk/debug/
    
    - name: Upload Server APK
      uses: actions/upload-artifact@v4
      with:
        name: server-apk
        path: |
          Server/build/outputs/apk/debug/*.apk
          Server/bin/*.apk
      if: always()